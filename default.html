<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudyWindow</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        
        .logo {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }
        
        .description {
            font-size: 18px;
            max-width: 600px;
            margin: 0 auto 40px;
        }
        
        .shortcuts {
            background-color: rgba(50, 50, 50, 0.7);
            padding: 20px;
            border-radius: 10px;
            max-width: 500px;
            text-align: left;
        }
        
        .shortcut {
            margin: 10px 0;
            display: flex;
            justify-content: space-between;
        }
        
        .key {
            background-color: rgba(80, 80, 80, 0.7);
            padding: 3px 8px;
            border-radius: 5px;
            margin-left: 15px;
        }
    </style>
</head>
<body>
    <div class="logo">CloudyWindow</div>
    <div class="description">
        A transparent browser overlay for your desktop. Browse the web while seeing through to your applications below.
    </div>
    
    <div class="shortcuts">
        <h3>Keyboard Shortcuts</h3>
        <div class="shortcut">
            <span>Focus URL Bar</span>
            <span class="key">Cmd+K / Cmd+L</span>
        </div>
        <div class="shortcut">
            <span>Toggle UI</span>
            <span class="key">Cmd+U</span>
        </div>
        <div class="shortcut">
            <span>Reload Page</span>
            <span class="key">Cmd+R</span>
        </div>
        <div class="shortcut">
            <span>Hard Reload</span>
            <span class="key">Cmd+Shift+R</span>
        </div>
        <div class="shortcut">
            <span>Toggle Fullscreen</span>
            <span class="key">Cmd+F / F11</span>
        </div>
        <div class="shortcut">
            <span>Back</span>
            <span class="key">Alt+Left</span>
        </div>
        <div class="shortcut">
            <span>Forward</span>
            <span class="key">Alt+Right</span>
        </div>
    </div>
    
    <script>
        // Ensure background is transparent
        document.body.style.backgroundColor = 'transparent';
        document.documentElement.style.backgroundColor = 'transparent';
    </script>
</body>
</html>
